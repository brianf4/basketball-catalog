<!doctype html>
<html>
    <head>
        <title>LA TV Shows | Home</title>
        <meta
            name="description"
            content="A Catalog of Shows Set in Los Angeles"
        />
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <header class="main-header">
            <span>NBA Player catalog</span>
        </header>
        <main>
            <span>Head-to-head-comparison</span>
            <div class="pvp">
                <div>
                    <span class="avatar">NJ</span>
                    <div>
                        <span>Nikola Jokic</span>
                        <span>DEN • C</span>
                    </div>
                </div>
                <div>
                    <span>vs</span>
                </div>
                <div>
                    <span class="avatar">NJ</span>
                    <div>
                        <span>Nikola Jokic</span>
                        <span>DEN • C</span>
                    </div>
                </div>
            </div>
            <div class="stats">
                <div class="player1">
                    <span>10</span>
                    <span>12</span>
                    <span>8</span>
                    <span>5</span>
                    <span>0.5</span>
                    <span>4.0</span>
                </div>
                <div class="players-stat">
                    <span>PTS</span>
                    <span>REB</span>
                    <span>AST</span>
                    <span>STL</span>
                    <span>BLK</span>
                    <span>TO</span>
                </div>
                <div class="player2">
                    <span>10</span>
                    <span>12</span>
                    <span>8</span>
                    <span>5</span>
                    <span>0.5</span>
                    <span>4.0</span>
                </div>
            </div>
            <div class="winner">
                <span>Winner (x of x categories)</span>
                <span>Joker</span>
            </div>
        </main>
        <div class="player-catalog">
            <div class="search-bar">
                <span>NBA player catalog</span>
                <input
                    type="text"
                    name="Search players"
                    placeholder="Search players..."
                />
                <button id="All" class="role active">All</button>
                <button id="G" class="role">G</button>
                <button id="F" class="role">F</button>
                <button id="C" class="role">C</button>
            </div>
            <div>
                <span
                    >50 players - 2025-26 season - Click a card to select for
                    comparison</span
                >
                <div class="card-container"></div>
            </div>
        </div>

        <script src="playersData.js"></script>
        <script type="text/javascript" src="scripts.js"></script>
    </body>
</html>
