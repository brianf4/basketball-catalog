<!doctype html>
<html>
    <head>
        <title>LA TV Shows | Home</title>
        <meta
            name="description"
            content="A Catalog of Shows Set in Los Angeles"
            charset="UTF-8"
        />
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <main>
            <span>Head-to-head-comparison</span>
            <div class="pvp">
                <div class="p1">
                    <button id="remove-p1" class="remove-btn">x</button>
                    <span class="p1-avatar"></span>
                    <div>
                        <span class="p1-name"></span>
                        <span class="p1-team-pos"></span>
                    </div>
                </div>
                <div>
                    <span class="vs">vs</span>
                </div>
                <div class="p2">
                    <button id="remove-p2" class="remove-btn">x</button>
                    <span class="p2-avatar"></span>
                    <div>
                        <span class="p2-name"></span>
                        <span class="p2-team-pos"></span>
                    </div>
                </div>
            </div>
            <div class="stats">
                <div class="player1">
                    <span class="p1-pts">x</span>
                    <span class="p1-reb">x</span>
                    <span class="p1-ast">x</span>
                    <span class="p1-stl">x</span>
                    <span class="p1-blk">x</span>
                    <span class="p1-to">x</span>
                </div>
                <div class="players-stat">
                    <span>PTS</span>
                    <span>REB</span>
                    <span>AST</span>
                    <span>STL</span>
                    <span>BLK</span>
                    <span>TO</span>
                </div>
                <div class="player2">
                    <span class="p2-pts">x</span>
                    <span class="p2-reb">x</span>
                    <span class="p2-ast">x</span>
                    <span class="p2-stl">x</span>
                    <span class="p2-blk">x</span>
                    <span class="p2-to">x</span>
                </div>
            </div>
            <div class="winner">
                <span class="ptsOfWinner"></span>
                <span class="nameOfWinner"></span>
            </div>
        </main>
        <div class="player-catalog">
            <div class="search-bar">
                <span>NBA player catalog 🏀</span>
                <div>
                    <!--<input
                        type="text"
                        name="Search players"
                        placeholder="Search players..."
                    />-->
                    <button id="All" class="role active">All</button>
                    <button id="G" class="role">G</button>
                    <button id="F" class="role">F</button>
                    <button id="C" class="role">C</button>
                </div>
            </div>
            <div>
                <span class="clickCompare"
                    ><span class="numOfPlayers">50</span> players - 2025-26
                    season - Click a card to select for comparison</span
                >
                <div class="card-container"></div>
            </div>
        </div>

        <script src="playersData.js"></script>
        <script type="text/javascript" src="scripts.js"></script>
    </body>
</html>
